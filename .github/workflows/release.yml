name: Release

on:
  workflow_dispatch: {}

jobs:
  release:
    permissions:
      contents: write
    uses: adamhl8/configs/.github/workflows/release.yml@main
    secrets: inherit

  docker:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Check out release tag
        run: git checkout "$(git describe --tags --abbrev=0)"

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          secrets: |
            GH_TOKEN=${{ secrets.GH_TOKEN }}
          platforms: linux/amd64
          push: true
          tags: ghcr.io/adamhl8/adamhl.dev:latest

      - name: Publish to homelab
        env:
          WATCHTOWER_API_TOKEN: ${{ secrets.WATCHTOWER_API_TOKEN }}
        run: |
          curl \
            -X POST \
            -H "Authorization: Bearer $WATCHTOWER_API_TOKEN" \
            https://watchtower.adamhl.dev/v1/update
